- defaults:
  link:
    relink: true

- clean: ["~"]

- link:
    # Shell
    ~/.bashrc: .bashrc

    ~/AppData/Roaming/nushell:
      create: true
      path: nushell

    ~/.config/starship.toml:
      create: true
      path: nushell/starship.toml

    # SSH config (hostnames, forwarding rules — no keys)
    ~/.ssh/config:
      create: true
      path: ssh/config

    # AI tool config — managed as dotfiles submodules
    ~/.claude:
      path: claude
      relink: true
    ~/.copilot:
      path: copilot
      relink: true

- shell:
    - [git submodule update --init --recursive, Installing submodules]
