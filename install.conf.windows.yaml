- defaults:
  link:
    relink: true

- clean: ["~"]

- link:
    # Shell
    ~/.bashrc: .bashrc

    ~/AppData/Roaming/nushell:
      create: true
      path: nushell

    ~/.config/starship.toml:
      create: true
      path: nushell/starship.toml

    # SSH config (hostnames, forwarding rules — no keys)
    ~/.ssh/config:
      create: true
      path: ssh/config

- shell:
    - [git submodule update --init --recursive, Installing submodules]

    - description: Clone Claude Code config
      command: >
        [ -d ~/.claude/.git ] &&
        (cd ~/.claude && git pull --ff-only) ||
        git clone git@github.com:cdprice02/claude-config.git ~/.claude

    - description: Clone Copilot config
      command: >
        [ -d ~/.copilot/.git ] &&
        (cd ~/.copilot && git pull --ff-only) ||
        git clone git@github.com:cdprice02/copilot-config.git ~/.copilot
