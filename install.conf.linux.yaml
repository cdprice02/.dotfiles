- defaults:
    link:
      relink: true

- clean: ["~"]

- shell:
    - description: Initialize submodules (bare repo)
      command: >
        GIT_DIR="$HOME/.dotfiles" GIT_WORK_TREE="$HOME"
        git submodule update --init --recursive

- link:
    # Nix (including darwin)
    ~/.config/nix: nix

    ~/.config/nushell:
      create: true
      path: nushell

    ~/.config/starship.toml:
      create: true
      path: nushell/starship.toml

    # SSH config (hostnames, forwarding rules — no keys)
    ~/.ssh/config:
      create: true
      path: ssh/config

    # AI tool config — managed as dotfiles submodules
    ~/.claude:
      path: claude
      relink: true
    ~/.copilot:
      path: copilot
      relink: true
